<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="manifest" href="/static/manifest.json">
    <title>Estado de Salas</title>
    </head>
<body>
    <div class="app-container">
        <header>ESTADO DE LABORATORIOS</header>
        <div class="content">
            {% for s in salas %}
            <div class="card" style="border-left: 5px solid {% if s.estado == 0 %}#2ecc71{% elif s.estado == 1 %}#e74c3c{% else %}#f1c40f{% endif %};">
                <div style="flex: 1;">
                    <strong>Sala {{ s.numero }}</strong><br>
                    <small>Docente: {{ s.docente }}</small>
                </div>
                <div style="font-weight: bold; color: #666;">
                    {% if s.estado == 0 %}Libre{% elif s.estado == 1 %}Ocupada{% else %}Apartada{% endif %}
                </div>
            </div>
            {% endfor %}
        </div>
        <nav class="nav-bar">
            <a href="/panel" class="nav-item">📋<br>Reportes</a>
            <a href="/estado" class="nav-item active">🏫<br>Salas</a>
            <a href="/salir" class="nav-item">🚪<br>Salir</a>
        </nav>
    </div>
</body>
</html>

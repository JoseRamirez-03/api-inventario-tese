<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="manifest" href="/static/manifest.json">
    <title>Nuevo Reporte</title>
    <style>
        :root { --azul: #003366; --gris: #f4f4f4; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--gris); }
        .app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        header { 
            background: var(--azul); color: white; padding: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            font-weight: bold;
        }
        .btn-back { color: white; text-decoration: none; font-size: 14px; }
        
        .content { flex: 1; overflow-y: auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        label { font-weight: bold; color: #333; display: block; margin-bottom: 5px; font-size: 14px; }
        input, select, textarea { 
            width: 100%; padding: 12px; margin-bottom: 15px; 
            border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; 
        }
        .btn-success {
            background: #2ecc71; color: white; border: none; padding: 15px; 
            width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <a href="/panel" class="btn-back">⬅ Volver</a>
            <span>NUEVO REPORTE</span>
            <span style="width: 50px;"></span> </header>
        <div class="content">
            <div class="card">
                <form action="/nuevo-reporte" method="POST">
                    <label>Nombre del Alumno:</label>
                    <input type="text" name="alumno" required>

                    <label>Sala:</label>
                    <select name="sala" required>
                        <option value="S01">S01</option>
                        <option value="S02">S02</option>
                        <option value="S03">S03</option>
                        <option value="S04">S04</option>
                    </select>

                    <label>No. de Máquina:</label>
                    <input type="text" name="maquina" placeholder="Ej. PC-12" required>

                    <label>Falla Detectada:</label>
                    <textarea name="falla" rows="4" required></textarea>

                    <button type="submit" class="btn-success">ENVIAR REPORTE</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

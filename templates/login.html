<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Inventario TESE</title>
    
    <!-- ========================================== -->
    <!-- ESTO ES LO QUE LO CONVIERTE EN APP MÓVIL   -->
    <!-- ========================================== -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#003366">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2206/2206232.png">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(() => console.log("Service Worker Registrado Exitosamente"));
        });
      }
    </script>
    <!-- ========================================== -->

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        h2 { color: #003366; }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #003366;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #002244; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Sistema de Inventario TESE</h2>
    <p>Ingresa tus credenciales</p>
    <form action="/acceder" method="POST">
        <input type="text" name="matricula" placeholder="Matrícula o Usuario" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <button type="submit">Ingresar</button>
    </form>
</div>

</body>
</html>

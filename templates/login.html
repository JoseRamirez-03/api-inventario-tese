<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
    <title>Acceso TESE</title>
</head>
<body>
    <div class="celular-frame" style="background: #003366; display: flex; align-items: center; justify-content: center;">
        <div style="background: white; padding: 30px; border-radius: 20px; width: 85%; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
            <h2 style="color: #003366; margin-bottom: 5px;">TESE</h2>
            <p style="font-size: 12px; color: #666; margin-bottom: 25px;">Control de Inventario</p>
            
            <form action="/acceder" method="POST">
                <input type="text" name="matricula" placeholder="Matrícula" required 
                       style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
                
                <input type="password" name="password" placeholder="Contraseña" required 
                       style="width: 100%; padding: 12px; margin-bottom: 25px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
                
                <button type="submit" 
                        style="width: 100%; background: #003366; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer;">
                    INGRESAR
                </button>
            </form>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="manifest" href="/static/manifest.json">
    <title>Detalle de Falla</title>
    <style>
        :root { --azul: #003366; --gris: #f4f4f4; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--gris); }
        .app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        header { 
            background: var(--azul); color: white; padding: 15px; 
            display: flex; justify-content: space-between; align-items: center; font-weight: bold;
        }
        .btn-back { color: white; text-decoration: none; font-size: 14px; }
        
        .content { flex: 1; overflow-y: auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px;}
        
        .info-row { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .info-row strong { color: var(--azul); display: block; margin-bottom: 3px; font-size: 14px;}
        
        .badge { display: inline-block; padding: 8px 15px; border-radius: 20px; font-weight: bold; color: white; font-size: 14px; }
        .badge.pendiente { background-color: #ff4d4d; }
        .badge.reparacion { background-color: #ffcc00; color: #333; }
        .badge.resuelto { background-color: #2ecc71; }
        
        select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        .btn-update { background: var(--azul); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 10px;}
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <a href="/panel" class="btn-back">⬅ Volver</a>
            <span>DETALLE DEL REPORTE</span>
            <span style="width: 50px;"></span>
        </header>
        <div class="content">
            <div class="card">
                <div class="info-row">
                    <strong>Alumno que reporta:</strong>
                    {{ r.alumno }}
                </div>
                <div class="info-row">
                    <strong>Ubicación del equipo:</strong>
                    Sala {{ r.sala }} - {{ r.maquina }}
                </div>
                <div class="info-row" style="border: none;">
                    <strong>Descripción de la falla:</strong>
                    {{ r.falla }}
                </div>
            </div>

            <div class="card" style="text-align: center;">
                <strong>Estado Actual:</strong><br><br>
                <span class="badge {% if r.estatus == 'Pendiente' %}pendiente{% elif r.estatus == 'En Reparación' %}reparacion{% else %}resuelto{% endif %}">
                    {{ r.estatus }}
                </span>
            </div>

            {% if rol == 'docente' %}
            <div class="card">
                <h4 style="margin-top: 0; color: var(--azul);">Actualizar Estado</h4>
                <form action="/detalle/{{ r._id }}" method="POST">
                    <select name="nuevo_estatus">
                        <option value="Pendiente" {% if r.estatus == 'Pendiente' %}selected{% endif %}>Pendiente</option>
                        <option value="En Reparación" {% if r.estatus == 'En Reparación' %}selected{% endif %}>En Reparación</option>
                        <option value="Resuelto" {% if r.estatus == 'Resuelto' %}selected{% endif %}>Resuelto</option>
                    </select>
                    <button type="submit" class="btn-update">Guardar Cambios</button>
                </form>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>

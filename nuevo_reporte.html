<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
    <title>Nuevo Reporte TESE</title>
</head>
<body>
    <div class="celular-frame">
        <header class="header-tese">
            <a href="/panel" style="text-decoration:none; color: white;">⬅️</a> 
            <strong style="margin-left: 10px;">Nuevo Reporte</strong>
        </header>

        <form action="/nuevo-reporte" method="POST" style="padding: 20px;">
            
            <label style="font-weight: bold; font-size: 14px;">Nombre del Alumno:</label>
            <input type="text" name="alumno" required style="width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #000; box-sizing: border-box;">

            <label style="font-weight: bold; font-size: 14px;">Sala:</label>
            <select name="sala" style="width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #000; box-sizing: border-box;">
                <option value="S01">S01</option>
                <option value="S02">S02</option>
                <option value="S03">S03</option>
                <option value="S04">S04</option>
                <option value="S05">S05</option>
                <option value="S06">S06</option>
                <option value="S07">S07</option>
            </select>

            <label style="font-weight: bold; font-size: 14px;">No. de Máquina:</label>
            <input type="text" name="maquina" required style="width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #000; box-sizing: border-box;">

            <label style="font-weight: bold; font-size: 14px;">Falla Detectada:</label>
            <textarea name="falla" required style="width: 100%; height: 80px; margin-top: 5px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #000; box-sizing: border-box;"></textarea>

            <button type="submit" style="width: 100%; background: #28a745; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer;">
                ENVIAR REPORTE
            </button>
        </form>
    </div>
</body>
</html>
